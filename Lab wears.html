            .chemical-img{

            }
            
           }
             @media screen and (min-width:992px){
                .jacket-container{
                    grid-template-columns: 200px 1fr;
                }
                .chemical p{
                    font-size: 1rem;
                }
            }
               .jacket-container{
            display: grid;
            gap: 2rem 1rem;
           
           }
           .tags-container{

             display: flex;
             flex-direction: column;
             padding-bottom: 3rem;

           }
           .jacket-list{
            display: grid;
            gap: 8rem 8rem;
            padding-bottom: 3rem;
            }
           .jackets{
            text-decoration: none;
            color: white;
            background-color: black;
            border-radius: 8px;
            padding: 15px;
            display: block;
            width: 300px;
            text-align: center;
            transition: transform 0.2s;
            position: relative;
           }
           .jackets:hover{
            transform: translate(-5px);
            box-shadow: 0 4px 15px rgb(0, 0, 0.0,1);
           }
           .img-container{
            position: relative;
            overflow: hidden;
            border-radius: 4px;
            max-width: 140%;
           }
           .chemical-img{
            width: 100%;
            height: 200%;
            object-fit: cover;
            max-width: 100%;
            display: block;
            border-radius: 8px 8px 0 0;
           }
           .price{
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: rgb(127, 255, 133);
            color: rgb(255, 255, 255);
            padding: 5px 10px;
            font-size: 0.8rem;
            font-weight: bold;
           }
           h2{
            margin-top: 10px;
            font-size: 1.1rem;
        }
            button{
            border-radius: 25px;
            width: fit-content;
            padding: 10px 30px;
            border: 1px solid #777;
            background-color: rgb(40, 228, 43);
            cursor: pointer;
            align-items: center;
            justify-content: center;
            display: flex;
           }
           .top-button{
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #333;
            color: white;
            padding: 10px 15px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 14px;
            z-index: 1000;
            box-shadow: 0 4px 8px rgba(0, 0, 0.0,2);
           }
