        * {
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

.contact-section {
    padding: 60px 20px;
    background-color: #f9f9f9;
    display: flex;
    justify-content: center;
}

.contact-container {
    display: flex;
    flex-wrap: wrap; /* Makes it stack on mobile */
    max-width: 1000px;
    width: 100%;
    background: #fff;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    border-radius: 15px;
    overflow: hidden;
}

/* Info Side */
.contact-info {
    flex: 1;
    background-color: #2c3e50;
    color: white;
    padding: 40px;
    min-width: 300px;
}

.contact-info h2 {
    margin-top: 0;
}

/* Form Side */
.contact-form {
    flex: 1.5;
    padding: 40px;
    min-width: 300px;
}

.form-group {
    margin-bottom: 20px;
}

.form-group label {
    display: block;
    margin-bottom: 5px;
    font-weight: bold;
}

.form-group input, 
.form-group textarea {
    width: 100%;
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 8px; /* Slightly rounded corners for inputs */
    outline: none;
}

/* The "Round and Short" Button */
.submit-btn {
    width: fit-content;
    padding: 12px 40px;
    border-radius: 50px;
    border: none;
    background-color: #2c3e50;
    color: white;
    cursor: pointer;
    font-size: 16px;
    transition: 0.3s;
}

.submit-btn:hover {
    background-color: #34495e;
    transform: translateY(-2px);
}
